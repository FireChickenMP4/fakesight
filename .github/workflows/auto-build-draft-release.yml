name: Auto Build Draft Release

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: auto-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-draft-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew build --no-daemon

      - name: Collect distributable JARs
        shell: bash
        run: |
          mkdir -p upload
          find build/libs -maxdepth 1 -type f -name "*.jar" \
            ! -name "*-sources.jar" \
            ! -name "*-dev.jar" \
            -exec cp {} upload/ \;

          count=$(find upload -maxdepth 1 -type f -name "*.jar" | wc -l)
          if [ "$count" -eq 0 ]; then
            echo "No distributable JAR found in build/libs"
            exit 1
          fi

      - name: Generate release metadata
        shell: bash
        run: |
          short_sha="${GITHUB_SHA::7}"
          echo "TAG_NAME=auto-build-${GITHUB_RUN_NUMBER}-${short_sha}" >> "$GITHUB_ENV"
          echo "RELEASE_NAME=Auto Build #${GITHUB_RUN_NUMBER} (${short_sha})" >> "$GITHUB_ENV"

      - name: Create draft release and upload JARs
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: ${{ env.RELEASE_NAME }}
          draft: true
          prerelease: true
          generate_release_notes: true
          files: upload/*.jar
